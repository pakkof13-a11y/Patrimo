services:
  postgres:
    image: postgres:16-alpine
    container_name: patrimo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: patrimo
      POSTGRES_PASSWORD: patrimo
      POSTGRES_DB: patrimo
    volumes:
      - patrimo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patrimo -d patrimo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  patrimo_pg_data:
